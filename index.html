<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icons/icon.svg">
  <link rel="stylesheet" href="./css/style.css">
  <title>Flashcards</title>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Flashcards</div>
      <select id="deck-select" class="deck-select" aria-label="Choose article"></select>
      <button id="btn-settings" class="icon-btn" type="button" aria-label="Settings">⚙</button>
    </header>

    <div class="stats">
      <div class="stat"><span class="stat-label">Due</span><span id="stat-remaining" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">Mastered</span><span id="stat-mastered" class="stat-value">0</span></div>
    </div>

    <main class="stage">
      <div id="card-area" class="card-area"></div>
      <section id="empty-state" class="empty-state" hidden></section>
    </main>
  </div>

  <!-- settings / backup panel -->
  <div id="settings-panel" class="panel" hidden>
    <div class="panel-sheet">
      <div class="panel-head">
        <h2>Settings</h2>
        <button id="btn-close-settings" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>

      <section class="panel-section">
        <h3>Backup progress</h3>
        <p class="muted">Your progress is stored only on this device. Export a backup before switching phones or clearing your browser.</p>
        <div class="panel-actions">
          <button id="btn-export" class="btn btn-secondary" type="button">Export</button>
          <label class="btn btn-secondary" for="import-file">Import</label>
          <input id="import-file" type="file" accept="application/json,.json" hidden>
        </div>
      </section>

      <section class="panel-section">
        <h3>Mastered words</h3>
        <div id="mastered-list" class="mastered-list"></div>
      </section>

      <section class="panel-section">
        <h3>Danger zone</h3>
        <button id="btn-clear" class="btn btn-danger" type="button">Clear all progress</button>
      </section>
    </div>
  </div>

  <script src="./js/srs.js"></script>
  <script src="./js/swipe.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
